name: Publish

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag to publish with
        required: false
        default: latest

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      
      - name: Get package version
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"
      
      - name: Check if version exists on npm
        id: check-version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          if npm view $PACKAGE_NAME@${{ steps.package-version.outputs.version }} version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️  Version ${{ steps.package-version.outputs.version }} already published"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Version ${{ steps.package-version.outputs.version }} is new"
          fi
      
      - name: Install dependencies
        if: steps.check-version.outputs.exists == 'false'
        run: npm install
      
      - name: Run tests
        if: steps.check-version.outputs.exists == 'false'
        run: npm test
      
      - name: Verify package
        if: steps.check-version.outputs.exists == 'false'
        run: npm pack --dry-run
      
      - name: Publish to npm
        if: steps.check-version.outputs.exists == 'false'
        run: npm publish --access public --tag ${{ inputs.npm_tag || 'latest' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Skip publish
        if: steps.check-version.outputs.exists == 'true'
        run: |
          echo "Skipping publish - version ${{ steps.package-version.outputs.version }} already exists on npm"
